# improve colors
set -g default-terminal 'screen-256color'
# enable copy
set -g default-command "reattach-to-user-namespace -l zsh"
set-option -g history-limit 1000
set-option -sg escape-time 10

# act like vim
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# act like GNU screen
unbind C-b
set -g prefix C-a

# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded..."

# start window numbers at 1 to match keyboard order with tmux window order
bind m set -g mouse on
bind M set -g mouse off
set -g mouse off

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# switch to last pane
bind-key C-a last-pane

# horizontal and vertical splits
unbind |
bind-key - split-window -v  -c '#{pane_current_path}'
bind-key | split-window -h  -c '#{pane_current_path}'

# tile all windows
unbind =
bind = select-layout tiled

unbind +
bind + resize-pane -Z

unbind Right
bind -r Right resize-pane -R 8
unbind Left
bind -r Left resize-pane -L 8
unbind Up
bind -r Up resize-pane -U 4
unbind Down
bind -r Down resize-pane -D 4


set -g status-fg default
set -g status-bg black

set -g status-interval 60

setw -g monitor-activity on 
set -g visual-activity on

set -g status-justify centre

set-window-option -g window-status-style bg=black,fg=cyan,noreverse

set-window-option -g window-status-current-style fg=white
set-window-option -g window-status-current-style bg=red

set-window-option -g window-status-current-format " #I:#W#[fg=cyan]#F "
set-window-option -g window-status-format " #I:#W#F "

set -g pane-border-style fg=green
set -g pane-border-style bg=black
set -g pane-active-border-style fg=white
set -g pane-active-border-style bg=yellow

set -g message-style fg=white 
set -g message-style bg=black 
set -g message-style bright 

set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P"

set -g status-right "#[fg=cyan]%d %b %R"

# Restore all programs
# set -g @resurrect-processes ':all:'

# border coloring for panes
# set-option -g pane-active-border-fg colour166

# bind-key -T copy-mode-vi 'v' send -j new-window -c '#{pane_current_path}'

set -g base-index 1
setw -g pane-base-index 1

bind b break-pane -d

bind C-j choose-tree

# Setup 'v' to begin selection as in Vim
# bind -t vi-copy v begin-selection
bind-key -T copy-mode-vi v send-keys -X begin-selection
# bind -t vi-copy y copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi y send-keys -X copy-pipe "reattach-to-user-namespace pbcopy"
# Update default binding of `Enter` to also use copy-pipe
# unbind -t vi-copy Enter
unbind-key -T copy-mode-vi Enter
# bind -t vi-copy Enter copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"


# unicode
#setw -g utf8 on
#set -g status-utf8 on

bind a send-prefix
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-shell-history 'on'

