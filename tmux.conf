# improve colors
set -g default-terminal 'screen-256color'
# enable copy integration on older macOS setups when available
if-shell 'command -v reattach-to-user-namespace >/dev/null 2>&1' \
  'set -g default-command "reattach-to-user-namespace -l zsh"' \
  'set -gu default-command'
set-option -g history-limit 1000
set-option -sg escape-time 10
#set -sg escape-time 0

# act like vim
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# act like GNU screen
unbind C-b
set -g prefix C-a

# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1
bind m set -g mouse on
bind M set -g mouse off

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# switch to last pane
bind-key C-a last-pane

# horizontal and vertical splits
unbind '"'
unbind %
unbind |
bind-key - split-window -v  -c '#{pane_current_path}'
bind-key '"' split-window -v -c '#{pane_current_path}'
bind-key % split-window -h -c '#{pane_current_path}'
bind-key \\ split-window -h -c '#{pane_current_path}'
bind-key | split-window -h  -c '#{pane_current_path}'

# tile all windows
unbind =
bind = select-layout tiled

unbind +
bind + resize-pane -Z

unbind Right
bind Right resize-pane -R 8
unbind Left
bind Left resize-pane -L 8
unbind Up
bind Up resize-pane -U 4
unbind Down
bind Down resize-pane -D 4

# Restore all programs
# set -g @resurrect-processes ':all:'

# border coloring for panes
# set-option -g pane-active-border-fg colour166

# bind-key -T copy-mode-vi 'v' send -j new-window -c '#{pane_current_path}'

set-option -g base-index 1

bind b break-pane -d

bind C-j choose-tree

# Setup 'v' to begin selection as in Vim
# bind -t vi-copy v begin-selection
bind-key -T copy-mode-vi v send-keys -X begin-selection
# bind -t vi-copy y copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi y send-keys -X copy-pipe "reattach-to-user-namespace pbcopy"
# Update default binding of `Enter` to also use copy-pipe
# unbind -t vi-copy Enter
unbind-key -T copy-mode-vi Enter
# bind -t vi-copy Enter copy-pipe "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# unicode
#setw -g utf8 on
#set -g status-utf8 on

bind a send-prefix
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-shell-history 'on'

# List of plugins
# Supports `github_username/repo` or full git URLs
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g status-right '#{battery_status_bg} Batt: #{battery_icon} #{battery_percentage} #{battery_remain} | %a %h-%d %H:%M '

# Other examples:
# github_username/plugin_name    \
# git@bitbucket.com/user/plugin  \

# initializes TMUX plugin manager
if-shell '[ -x ~/.tmux/plugins/tpm/tpm ]' \
  'run -b ~/.tmux/plugins/tpm/tpm'
if-shell '[ -f ~/.tmux/plugins/tmux-resurrect/resurrect.tmux ]' \
  'run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
